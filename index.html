<style>
:root {
  --bg: #F5F3EF;
  --surface: #FFFFFF;
  --border: #E2DDD6;
  --text: #1A1816;
  --text-2: #6B6560;
  --text-3: #A39D97;
  --accent: #C84B2F;
  --accent-bg: #FAF0ED;
  --yellow: #E8A020;
  --yellow-bg: #FEF6E8;
  --green: #2E7D52;
  --green-bg: #EAF4EE;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --radius: 8px;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--text); }
.logo span { color: var(--accent); }
.sync-pill {
  font-family: var(--mono); font-size: 11px; padding: 3px 10px; border-radius: 999px;
  display: inline-flex; align-items: center; gap: 5px; transition: all 0.2s;
}
.sync-pill.ok { background: var(--green-bg); color: var(--green); }
.sync-pill.warn { background: var(--yellow-bg); color: var(--yellow); }
.sync-pill.err { background: var(--accent-bg); color: var(--accent); }
.sync-pill.idle { background: var(--bg); color: var(--text-3); border: 1px solid var(--border); }
.dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.dot.pulse { animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.btn-google {
  font-family: var(--sans); font-size: 13px; font-weight: 500; padding: 6px 14px;
  border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface);
  color: var(--text); cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
  box-shadow: var(--shadow); transition: all 0.15s;
}
.btn-google:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }

.main { max-width: 780px; margin: 0 auto; padding: 2rem 1.5rem; }

.login-wall {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 60vh; text-align: center; animation: fadeIn 0.4s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.login-wall h2 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
.login-wall p { font-size: 14px; color: var(--text-2); max-width: 360px; line-height: 1.6; margin-bottom: 2rem; }
.login-note { font-size: 12px; color: var(--text-3); margin-top: 1rem; }

.stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 2rem; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.2rem; box-shadow: var(--shadow); }
.stat-label { font-family: var(--mono); font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.stat-value { font-size: 28px; font-weight: 600; color: var(--text); line-height: 1; }
.stat-value.accent { color: var(--accent); }

.add-row {
  display: flex; gap: 8px; margin-bottom: 1.5rem; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius); padding: 8px; box-shadow: var(--shadow);
}
.add-row input { flex: 1; font-family: var(--sans); font-size: 14px; border: none; outline: none; background: transparent; color: var(--text); padding: 4px 6px; }
.add-row input::placeholder { color: var(--text-3); }
.add-row select { font-family: var(--mono); font-size: 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text-2); padding: 4px 8px; cursor: pointer; }
.btn-add { font-family: var(--sans); font-size: 13px; font-weight: 500; padding: 6px 14px; border-radius: 6px; border: none; background: var(--accent); color: white; cursor: pointer; white-space: nowrap; }
.btn-add:hover { opacity: 0.88; }

.group-label {
  font-family: var(--mono); font-size: 11px; color: var(--text-3); text-transform: uppercase;
  letter-spacing: 0.06em; padding: 1rem 0 6px; border-top: 1px solid var(--border); margin-top: 4px;
  display: flex; align-items: center; gap: 8px;
}
.group-label:first-child { border-top: none; margin-top: 0; padding-top: 0; }
.group-dot { width: 6px; height: 6px; border-radius: 50%; }
.g-a .group-dot { background: var(--accent); }
.g-m .group-dot { background: var(--yellow); }
.g-b .group-dot { background: var(--green); }
.g-n .group-dot { background: var(--text-3); }

.task-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 4px; }
.task {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 10px 12px; display: grid; grid-template-columns: 1fr auto; gap: 8px;
  align-items: start; box-shadow: var(--shadow); transition: border-color 0.15s, box-shadow 0.15s;
}
.task:hover { border-color: #CCC8C0; box-shadow: var(--shadow-md); }
.task-text { font-size: 14px; color: var(--text); line-height: 1.45; cursor: pointer; border: none; background: transparent; width: 100%; font-family: var(--sans); padding: 0; }
.task-text:hover { color: var(--accent); }
.task-text-input { font-size: 14px; font-family: var(--sans); border: none; border-bottom: 1.5px solid var(--accent); background: transparent; color: var(--text); width: 100%; outline: none; padding: 0 0 2px; }
.task-note { font-family: var(--mono); font-size: 11px; color: var(--text-3); margin-top: 4px; cursor: pointer; }
.task-note:hover { color: var(--text-2); }
.task-note-input { font-family: var(--mono); font-size: 11px; border: none; border-bottom: 1px solid var(--border); background: transparent; color: var(--text-2); width: 100%; outline: none; margin-top: 4px; padding: 0 0 1px; }
.task-meta { font-family: var(--mono); font-size: 11px; color: var(--text-3); margin-top: 4px; }
.task-actions { display: flex; align-items: center; gap: 4px; padding-top: 2px; }
.task-prio { font-family: var(--mono); font-size: 11px; padding: 2px 8px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); color: var(--text-2); cursor: pointer; }
.task-prio.p-a { background: var(--accent-bg); color: var(--accent); border-color: transparent; }
.task-prio.p-m { background: var(--yellow-bg); color: var(--yellow); border-color: transparent; }
.task-prio.p-b { background: var(--green-bg); color: var(--green); border-color: transparent; }
.icon-btn { width: 28px; height: 28px; border-radius: 6px; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-3); transition: all 0.1s; }
.icon-btn:hover { background: var(--bg); color: var(--text); }
.icon-btn.complete:hover { color: var(--green); background: var(--green-bg); }
.icon-btn.remove:hover { color: var(--accent); background: var(--accent-bg); }

.done-toggle { font-family: var(--mono); font-size: 12px; color: var(--text-3); background: transparent; border: none; cursor: pointer; display: flex; align-items: center; gap: 6px; padding: 12px 0 6px; width: 100%; }
.done-toggle:hover { color: var(--text-2); }
.done-list { display: none; flex-direction: column; gap: 4px; }
.done-list.open { display: flex; }
.task.done { opacity: 0.5; }
.task.done .task-text { text-decoration: line-through; color: var(--text-3); cursor: default; }
.empty { font-family: var(--mono); font-size: 13px; color: var(--text-3); padding: 1.5rem 0; text-align: center; }
</style>
</head>

      <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path></svg>

<div class="main">
  <div class="login-wall" id="login-wall" style="display: flex;">

      <div class="stat"><div class="stat-label">Activos</div><div class="stat-value" id="s-active">–</div></div>
      <div class="stat"><div class="stat-label">Alta prioridad</div><div class="stat-value accent" id="s-high">–</div></div>

      Completados (<span id="done-count">0</span>)
    </button>
    <div class="done-list" id="done-list"></div>

</div>

<script>
const CLIENT_ID = '575323269025-62mshlmf9fr0d1ofj59m1g6kgnn8rikr.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.appdata';
const FILE_NAME = 'pendientes-fg.json';
const REDIRECT_URI = 'https://felicianogarcia-beep.github.io/pendientes-fg/';
const GN = {a:'Alta prioridad',m:'Media prioridad',b:'Baja prioridad','':'Sin prioridad'};
const PC = {a:'p-a',m:'p-m',b:'p-b',''  :''};
const GC = {a:'g-a',m:'g-m',b:'g-b','':'g-n'};

let token = null, fileId = null, state = {active:[],done:[]}, nextId = 100, saveTimer = null;

const DA = [
  {id:1,text:"Planilla PPTO con Mgz (Esteban Casado)",p:"",note:"",s:td()},
  {id:2,text:"Mandar tabla a nivel rubro con gerencia y Paro",p:"",note:"Validar con Esteban",s:td()},
  {id:3,text:"Revisar costo de internet en panel de ticket",p:"",note:"",s:td()},
  {id:4,text:"Información para BY",p:"",note:"",s:td()},
  {id:5,text:"Stock máximo x tienda",p:"",note:"",s:td()},
  {id:6,text:"Planilla para planificar x Marca",p:"",note:"",s:td()},
  {id:7,text:"Revisar Calendario x Semana → qué pasa con semana 53",p:"",note:"",s:td()},
  {id:8,text:"Gestión de Markdown con Analytics",p:"",note:"",s:td()},
  {id:9,text:'Rearmar "Calidad del Inventario"',p:"",note:"",s:td()},
  {id:10,text:"Revisar propuesta de Gabriel Callete",p:"",note:"",s:td()},
  {id:11,text:"Ver presentación de protección de datos",p:"",note:"",s:td()},
  {id:12,text:"Armar nueva tipología",p:"",note:"",s:td()},
  {id:13,text:"Armar flujo de trabajo OTR/compra revisado con Abastecimiento",p:"",note:"",s:td()},
  {id:14,text:"Metas de Mgz y DOM para regional",p:"",note:"",s:td()},
  {id:15,text:"EY con D. Pérez",p:"",note:"",s:td()},
  {id:16,text:"Armar proceso compra importada por flujo",p:"",note:"",s:td()},
  {id:17,text:"Armar proceso OTR/compra Planner/Inventory",p:"",note:"",s:td()},
  {id:18,text:"Mandar rollings",p:"",note:"",s:td()},
  {id:19,text:"Revisar datos para venta calzadas",p:"",note:"",s:td()},
];
const DD = [
  {id:'c1',text:"Cargar precios FM Obsoletos para tiendas con buen agotamiento",e:td()},
  {id:'c2',text:"Preparar presentación Q1",e:td()},
  {id:'c3',text:"Preparar presentación Category",e:td()},
  {id:'c4',text:"Objetivos Equipo",e:td()},
  {id:'c5',text:"Reunión miércoles con Esteban",e:td()},
  {id:'c6',text:"Revisar Oxford Esteban",e:td()},
  {id:'c7',text:"Agendar Oracle — martes 17:00",e:td()},
];

function td(){return new Date().toLocaleDateString('es-CL',{day:'2-digit',month:'2-digit',year:'numeric'});}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function setSP(status,text){
  const p=document.getElementById('sync-pill'),d=document.getElementById('sync-dot'),t=document.getElementById('sync-text');
  p.className='sync-pill '+(status||'idle');
  d.className='dot'+(status==='loading'?' pulse':'');
  t.textContent=text;
}

// PKCE helpers
function b64url(buf){return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
async function genVerifier(){const a=new Uint8Array(32);crypto.getRandomValues(a);return b64url(a);}
async function genChallenge(v){const e=new TextEncoder(),d=await crypto.subtle.digest('SHA-256',e.encode(v));return b64url(d);}

async function doLogin(){
  const verifier = await genVerifier();
  const challenge = await genChallenge(verifier);
  sessionStorage.setItem('pkce_verifier', verifier);
  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    redirect_uri: REDIRECT_URI,
    response_type: 'code',
    scope: SCOPES,
    code_challenge: challenge,
    code_challenge_method: 'S256',
    access_type: 'online',
    prompt: 'consent'
  });
  location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();
}

async function exchangeCode(code){
  const verifier = sessionStorage.getItem('pkce_verifier');
  sessionStorage.removeItem('pkce_verifier');
  const res = await fetch('https://oauth2.googleapis.com/token', {
    method: 'POST',
    headers: {'Content-Type':'application/x-www-form-urlencoded'},
    body: new URLSearchParams({
      code, client_id: CLIENT_ID,
      redirect_uri: REDIRECT_URI,
      grant_type: 'authorization_code',
      code_verifier: verifier
    })
  });
  const data = await res.json();
  return data.access_token || null;
}

async function init(){
  const params = new URLSearchParams(location.search);
  const code = params.get('code');
  if(code){
    history.replaceState(null,'',location.pathname);
    setSP('loading','autenticando...');
    document.getElementById('loading-wall').style.display='flex';
    token = await exchangeCode(code);
    if(token){
      sessionStorage.setItem('gtoken', token);
      await loadFromDrive();
    } else {
      setSP('err','error de autenticación');
      showLogin();
    }
    return;
  }
  const saved = sessionStorage.getItem('gtoken');
  if(saved){ token=saved; await loadFromDrive(); return; }
  showLogin();
}

async function loadFromDrive(){
  document.getElementById('loading-wall').style.display='flex';
  document.getElementById('login-wall').style.display='none';
  document.getElementById('app').style.display='none';
  setSP('loading','cargando...');
  try{
    const res = await fetch(`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&fields=files(id,name)&q=name='${FILE_NAME}'`,{
      headers:{Authorization:'Bearer '+token}
    });
    if(res.status===401){setSP('err','sesión expirada');token=null;sessionStorage.removeItem('gtoken');showLogin();return;}
    const data = await res.json();
    if(data.files&&data.files.length>0){
      fileId=data.files[0].id;
      const c=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{headers:{Authorization:'Bearer '+token}});
      const json=await c.json();
      state.active=(json.active||[]).map(t=>({...t,note:t.note||''}));
      state.done=json.done||[];
    } else {
      state.active=DA.map(t=>({...t}));
      state.done=DD.map(t=>({...t}));
      await saveToDrive(true);
    }
    nextId=Math.max(nextId,...state.active.map(t=>+t.id||0),...state.done.map(t=>isNaN(t.id)?0:+t.id))+1;
    document.getElementById('loading-wall').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('btn-login').style.display='none';
    setSP('ok','sincronizado · '+td());
    render();
  } catch(e){setSP('err','error al conectar');showLogin();}
}

async function saveToDrive(silent=false){
  if(!token)return;
  if(!silent)setSP('loading','guardando...');
  try{
    const body=JSON.stringify(state);
    const meta=fileId?{}:{name:FILE_NAME,parents:['appDataFolder']};
    const url=fileId?`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`:`https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
    const method=fileId?'PATCH':'POST';
    const form=new FormData();
    form.append('metadata',new Blob([JSON.stringify(meta)],{type:'application/json'}));
    form.append('file',new Blob([body],{type:'application/json'}));
    const res=await fetch(url,{method,headers:{Authorization:'Bearer '+token},body:form});
    const d=await res.json();
    if(!fileId&&d.id)fileId=d.id;
    if(!silent)setSP('ok','guardado · '+td());
  }catch(e){if(!silent)setSP('err','error al guardar');}
}

function scheduleSave(){clearTimeout(saveTimer);setSP('warn','sin guardar');saveTimer=setTimeout(()=>saveToDrive(),1500);}
function showLogin(){
  document.getElementById('loading-wall').style.display='none';
  document.getElementById('login-wall').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('btn-login').style.display='flex';
  setSP('idle','sin conexión');
}

function render(){
  document.getElementById('s-active').textContent=state.active.length;
  document.getElementById('s-high').textContent=state.active.filter(t=>t.p==='a').length;
  document.getElementById('s-done').textContent=state.done.length;
  document.getElementById('done-count').textContent=state.done.length;
  const groups={a:[],m:[],b:[],'':[]} ;
  state.active.forEach(t=>(groups[t.p||'']||groups['']).push(t));
  let html='';
  ['a','m','b',''].forEach(pg=>{
    const g=groups[pg];if(!g.length)return;
    html+=`<div class="group-label ${GC[pg]}"><span class="group-dot"></span>${GN[pg]}</div><div class="task-list">`;
    g.forEach(t=>{
      html+=`<div class="task" id="tk${t.id}">
        <div class="task-body">
          <div class="task-text" id="tt${t.id}" onclick="editText(${t.id})">${esc(t.text)}</div>
          ${t.note?`<div class="task-note" onclick="editNote(${t.id})">${esc(t.note)}</div>`:`<div class="task-note" style="opacity:0.4" onclick="editNote(${t.id})">+ nota</div>`}
          <div class="task-meta">${t.s||''}</div>
        </div>
        <div class="task-actions">
          <select class="task-prio ${PC[t.p||'']}" onchange="setPrio(${t.id},this.value)">
            <option value="" ${!t.p?'selected':''}>·</option>
            <option value="a" ${t.p==='a'?'selected':''}>Alta</option>
            <option value="m" ${t.p==='m'?'selected':''}>Media</option>
            <option value="b" ${t.p==='b'?'selected':''}>Baja</option>
          </select>
          <button class="icon-btn complete" onclick="complete(${t.id})" title="Completar">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7l4 4 6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="icon-btn remove" onclick="del(${t.id})" title="Eliminar">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>`;
    });
    html+='</div>';
  });
  if(!state.active.length)html='<div class="empty">Sin pendientes activos 🎉</div>';
  document.getElementById('task-list').innerHTML=html;
  document.getElementById('done-list').innerHTML=state.done.slice().reverse().map(t=>`
    <div class="task done">
      <div class="task-body">
        <div class="task-text">${esc(t.text)}</div>
        <div class="task-meta">${t.e?'Completado '+t.e:''}</div>
      </div>
      <div class="task-actions">
        <button class="icon-btn remove" onclick="delDone('${t.id}')" title="Eliminar">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>`).join('');
}

function editText(id){const t=state.active.find(x=>x.id===id);if(!t)return;const el=document.getElementById('tt'+id);el.outerHTML=`<input class="task-text-input" id="tt${id}" value="${esc(t.text)}" onblur="saveText(${id},this.value)" onkeydown="if(event.key==='Enter')this.blur()"/>`;document.getElementById('tt'+id).focus();}
function saveText(id,v){const t=state.active.find(x=>x.id===id);if(!t)return;t.text=v.trim()||t.text;scheduleSave();render();}
function editNote(id){const t=state.active.find(x=>x.id===id);if(!t)return;const el=document.querySelector(`#tk${id} .task-note`);if(!el)return;el.outerHTML=`<input class="task-note-input" id="ni${id}" value="${esc(t.note||'')}" placeholder="Agregar nota..." onblur="saveNote(${id},this.value)" onkeydown="if(event.key==='Enter')this.blur()"/>`;document.getElementById('ni'+id).focus();}
function saveNote(id,v){const t=state.active.find(x=>x.id===id);if(!t)return;t.note=v.trim();scheduleSave();render();}
function setPrio(id,v){const t=state.active.find(x=>x.id===id);if(!t)return;t.p=v;scheduleSave();render();}
function complete(id){const i=state.active.findIndex(x=>x.id===id);if(i<0)return;const t=state.active.splice(i,1)[0];t.e=td();state.done.push(t);scheduleSave();render();}
function del(id){state.active=state.active.filter(x=>x.id!==id);scheduleSave();render();}
function delDone(id){state.done=state.done.filter(x=>String(x.id)!==String(id));scheduleSave();render();}
function addTask(){const v=document.getElementById('new-task').value.trim();if(!v)return;const p=document.getElementById('new-prio').value;state.active.push({id:nextId++,text:v,p,note:'',s:td()});document.getElementById('new-task').value='';document.getElementById('new-prio').value='';scheduleSave();render();}
function toggleDone(){const dl=document.getElementById('done-list'),arr=document.getElementById('done-arrow');dl.classList.toggle('open');arr.style.transform=dl.classList.contains('open')?'rotate(180deg)':'';}

init();
</script>


</body></html>
